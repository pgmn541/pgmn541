<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Atendimento - Loja 541</title>
    <style>
        /* Estilização Geral e Responsiva */
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Roboto', Arial, sans-serif;
            background-color: #0404bc; /* Seu Azul Royal */
            color: white;
            text-align: center;
        }

        /* Texto de Instrução acima do botão */
        #instrucao {
            margin-bottom: 30px;
            font-size: 1.1rem;
            line-height: 1.5;
            max-width: 400px;
            font-weight: 300;
            transition: opacity 0.3s;
        }

        strong { color: #ffffff; font-weight: 700; }

        /* O Botão Principal */
        .botao-fluxo {
            background-color: #ffffff;
            color: #0404bc;
            border: none;
            padding: 20px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 350px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .botao-fluxo:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.3);
            background-color: #f0f0f0;
        }

        .botao-fluxo:active { transform: scale(0.95); }

        /* Rodapé discreto */
        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div id="instrucao">Carregando atendimento...</div>

    <button id="btnPrincipal" class="botao-fluxo" onclick="proximoPasso()">
        Iniciar
    </button>

    <div class="footer"><img src="logo.png" alt="Logo da Pague Menos"></div>

    <script>
        // Configurações dos Passos
        const etapas = [
            {
                textoTopo: "Clique no Botão Abaixo para Falar com Nosso <strong>Atendimento com IA.</strong><br><br>⚠️ <strong>IMPORTANTE!</strong> Quando o atendente com IA te pedir CEP, <strong>volte nessa página</strong> para continuar.",
                textoBotao: "Fazer pedido agora",
                link: "https://wa.me/551140028282?text=Quero%20pedir%20pra%20Loja%20541%20da%20Av.%20Vereador%20Rodolfo%20Francelino%20Arag%C3%A3o%2C%2088%20-%20Bairro%20Novo%20em%20Santa%20Cruz%20do%20Capibaribe%3A%20https%3A%2F%2Fshare.google%2Fz98SyXR4hPf4GEp2j"
            },
            {
                textoTopo: "Toque abaixo para comprar na <strong>LOJA 541</strong> da <strong>📍 Av. Vr. Rodolfo Francelino Aragão, 88 - Bairro Novo.</strong><br><br>⚠️ <i>Se ainda precisar de ajuda, <strong>volte aqui e te ajudamos. 😉</strong></i>",
                textoBotao: "<strong>Informar nosso CEP pra retirar AQUI</strong>",
                link: "https://wa.me/551140028282?text=55194333" // Ajuste o CEP aqui
            },
            {
                textoTopo: "Se ainda precisa de ajuda, pode falar direto com a gente, tá? 😊",
                textoBotao: "Falar direto com Nossa Loja",
                link: "https://api.whatsapp.com/send?phone=551140028282&text=Olá!%20Gostaria%20de%20falar%20com%20um%20atendente%2C%20vim%20pelo%20link%20de%20ajuda"
            }
        ];

        // Recuperar progresso do localStorage ou começar do zero
        let passoAtual = parseInt(localStorage.getItem('passoCliente')) || 0;

        // Função para atualizar a tela
        function atualizarTela() {
            const etapa = etapas[passoAtual] || etapas[etapas.length - 1];
            document.getElementById('instrucao').innerHTML = etapa.textoTopo;
            document.getElementById('btnPrincipal').innerText = etapa.textoBotao;
        }

        // Função executada no clique
        function proximoPasso() {
            const etapa = etapas[passoAtual];
            
            // Abre o WhatsApp da etapa atual
            window.open(etapa.link, '_blank');

            // Avança para o próximo passo (se não for o último)
            if (passoAtual < etapas.length - 1) {
                passoAtual++;
                localStorage.setItem('passoCliente', passoAtual); // Salva o progresso
                setTimeout(atualizarTela, 1000); // Atualiza o visual após 1 segundo
            }
        }

        // Iniciar a tela pela primeira vez
        atualizarTela();
    </script>
</body>
</html>
